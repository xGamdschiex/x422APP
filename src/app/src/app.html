<!doctype html>
<html lang="de" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0D1B0E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>x422 feeding</title>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <script>
    // Force SW cleanup — läuft VOR allem anderen
    (function() {
      var SW_VERSION = 5;
      var KEY = 'athena_sw_ver';
      var stored = parseInt(localStorage.getItem(KEY) || '0', 10);
      if (stored < SW_VERSION && 'serviceWorker' in navigator) {
        localStorage.setItem(KEY, String(SW_VERSION));
        // Alle alten SWs und Caches entfernen
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          var promises = regs.map(function(r) { return r.unregister(); });
          return Promise.all(promises);
        }).then(function() {
          return caches.keys();
        }).then(function(names) {
          return Promise.all(names.map(function(n) { return caches.delete(n); }));
        }).then(function() {
          // Neuen SW registrieren und Seite neu laden
          navigator.serviceWorker.register('/sw.js').then(function() {
            window.location.reload();
          });
        });
      } else if (!stored && 'serviceWorker' in navigator) {
        localStorage.setItem(KEY, String(SW_VERSION));
        navigator.serviceWorker.register('/sw.js');
      }
    })();
  </script>
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
